name: ark_fit_gym
description: "A new Flutter project."
publish_to: 'none' 

#version: 1.1.0+4
#version: 1.1.0+5
version: 1.1.0+7

environment:
  sdk: ^3.9.2
dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  get: ^4.7.3
  flutter_svg: ^2.2.3
  pinput: ^6.0.1
  flutter_unit_ruler: ^0.0.20
  fl_chart: ^1.1.1
  flutter_slidable: ^4.0.3
  percent_indicator: ^4.2.5
  http: ^1.6.0
  shared_preferences: ^2.5.4
  #simple_barcode_scanner: ^0.4.0
  image_picker: ^1.0.7
  pedometer: ^4.1.1
  permission_handler: ^12.0.1
  flutter_screenutil: ^5.9.3
  cached_network_image: ^3.4.0
  intl: ^0.20.2
  health: ^12.0.0
  device_info_plus: ^11.5.0
  speech_to_text: ^7.3.0
  flutter_tts: ^4.2.5
  change_app_package_name: ^1.1.0
  audioplayers: ^6.6.0

  #
  pdf: ^3.10.4
  printing: ^5.12.0
  csv: ^5.0.2
  path_provider: ^2.1.2
  share_plus: ^7.2.1
  easy_localization: ^3.0.8
  webview_flutter: ^4.13.1
  mobile_scanner: ^7.2.0
  firebase_core: ^4.6.0
  firebase_messaging: ^16.1.3
  flutter_local_notifications: ^20.1.0
  google_sign_in: ^7.2.0
  firebase_auth: ^6.3.0
  url_launcher: ^6.2.4



dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_launcher_icons: ^0.14.4

  flutter_lints: ^5.0.0
  
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/ARKfit_icon.png"
  remove_alpha_ios: true

flutter:

  uses-material-design: true

  assets:
  - assets/images/
  - assets/icons/
  - assets/sounds/
  - assets/translations/
   
  fonts:
    - family: urbanist
      fonts:
        - asset: assets/fonts/urbanist-latin-400-normal.ttf
          weight: 400
        - asset: assets/fonts/urbanist-latin-500-normal.ttf
          weight: 500
        - asset: assets/fonts/urbanist-latin-600-normal.ttf
          weight: 600
        - asset: assets/fonts/urbanist-latin-700-normal.ttf
          weight: 700
        - asset: assets/fonts/urbanist-latin-800-normal.ttf
          weight: 800
